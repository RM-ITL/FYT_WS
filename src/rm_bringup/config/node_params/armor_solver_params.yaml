/**:
  ros__parameters:
    debug: true
    target_frame: odom
    max_armor_distance: 10.0

    ekf:
      sigma2_q_x: 0.05
      sigma2_q_y: 0.05
      sigma2_q_z: 0.05
      sigma2_q_yaw: 1.0
      sigma2_q_r: 80.0

      r_x: 4e-4
      r_y: 4e-4
      r_z: 9e-4
      r_yaw: 5e-3

    tracker:
      max_match_distance: 0.5
      max_match_yaw_diff: 1.0

      tracking_thres: 0
      lost_time_thres: 1.0
      single_plate_threshold: 50
      omega_threshold: 0.5
      timeout_sec: 0.1
      max_abs_v_yaw: 12.0

    planner:
      fire_thresh: 0.02
      decision_speed: 3.0
      high_speed_delay_time: 0.05
      low_speed_delay_time: 0.02
      max_yaw_acc: 20.0
      max_pitch_acc: 50.0
      q_yaw: [50.0, 1.0]
      r_yaw: [1.0]
      q_pitch: [50.0, 1.0]
      r_pitch: [1.0]
    
    solver:
      prediction_delay: 0.0
      controller_delay: 0.0
      max_tracking_v_yaw: 60.0 #转速(rad/s)大于这个值时瞄准机器人中心 
      side_angle: 20.0 
      bullet_speed: 25.0
      feedforward_alpha: 0.25
      enable_acceleration_feedforward: false
      predictive_ff_dt: 0.01
      max_yaw_vel: 5.0
      max_pitch_vel: 3.0
      max_yaw_acc: 20.0
      max_pitch_acc: 50.0
      max_delta_yaw_for_feedforward: 0.03
      max_delta_pitch_for_feedforward: 0.02
      near_tolerance_yaw: 0.0314
      near_tolerance_pitch: 0.0314
      far_tolerance_yaw: 0.0227
      far_tolerance_pitch: 0.0227
      strict_distance_threshold: 2.0
      compenstator_type: "ideal"
      gravity: 10.0
      resistance: 0.092
      iteration_times: 20 # 补偿的迭代次数
      # ["距离下限, 距离上限, 高度下限, 高度下限, pitch轴补偿值"]
      pitch_offset: [
        "5.0 6.0 -1.0 0.4 0.0",
        "5.0 6.0  0.4 0.8 0.0",
        "5.0 6.0  0.8 1.2 0.0",
        "6.0 7.0 -1.0 0.4 0.0",
        "6.0 7.0  0.4 0.8 0.0",
        "6.0 7.0  0.8 1.2 0.0",
        "7.0 8.0 -1.0 0.4 0.0",
        "7.0 8.0  0.4 0.8 0.0",
        "7.0 8.0  0.8 1.2 0.0",
      ]
